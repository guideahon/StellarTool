name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: win64_msvc2022_64

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure (tests)
        run: cmake -S . -B build_tests -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

      - name: Build tests
        run: cmake --build build_tests --target StellarToolTests

      - name: Run tests
        run: |
          .\build_tests\StellarToolTests.exe
          if ($LASTEXITCODE -ne 0) {
            Get-Content test_diff.txt -ErrorAction SilentlyContinue
            Get-Content test_merge.txt -ErrorAction SilentlyContinue
            exit 1
          }

      - name: Configure (app)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build app
        run: cmake --build build --target StellarTool
