name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: win64_msvc2022_64

      - name: Configure (tests)
        run: cmake -S . -B build_tests -G "Visual Studio 17 2022" -A x64 -DBUILD_TESTS=ON

      - name: Build tests
        run: cmake --build build_tests --config Release --target StellarToolTests

      - name: Run tests
        run: |
          .\build_tests\Release\StellarToolTests.exe
          if ($LASTEXITCODE -ne 0) {
            Get-Content test_diff.txt -ErrorAction SilentlyContinue
            Get-Content test_merge.txt -ErrorAction SilentlyContinue
            exit 1
          }

      - name: Configure (app)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build app
        run: cmake --build build --config Release --target StellarTool
